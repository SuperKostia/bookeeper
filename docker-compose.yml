services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bookeeper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookeeper
      POSTGRES_PASSWORD: bookeeper
      POSTGRES_DB: bookeeper
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bookeeper']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bookeeper-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
